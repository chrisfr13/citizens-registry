name: CI Pipeline - Citizens Registry

# Εκτελείται ΜΟΝΟ για commits στο κλαδί develop
on:
  push:
    branches:
      - develop

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # JOB 1: Μεταγλώττιση + Δοκιμές Μονάδων & ORM (Unit / ORM Tests)
  # ─────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Build & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout κώδικα
        uses: actions/checkout@v4

      - name: Εγκατάσταση JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Μεταγλώττιση ολόκληρου του project (χωρίς tests)
      - name: Μεταγλώττιση (compile)
        run: mvn -B compile --file pom.xml

      # Εκτέλεση unit / ORM δοκιμών μόνο για το service module
      - name: Εκτέλεση δοκιμών μονάδων & ORM
        run: mvn -B test -pl domain,service --also-make

      # Μεταφόρτωση αρχείων αναφοράς Surefire (unit tests)
      - name: Μεταφόρτωση αναφορών δοκιμών μονάδων
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: |
            service/target/surefire-reports/
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2: Δοκιμές Ενοποίησης / API (Integration Tests)
  # ─────────────────────────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests (API)
    runs-on: ubuntu-latest
    needs: unit-tests   # Εκτελείται μετά την επιτυχία των unit tests

    steps:
      - name: Checkout κώδικα
        uses: actions/checkout@v4

      - name: Εγκατάσταση JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Build χωρίς tests για να φτιαχτεί το JAR
      - name: Μεταγλώττιση και εγκατάσταση στο local Maven repo
        run: mvn -B install -DskipTests --file pom.xml

      # Εκκίνηση της υπηρεσίας στο background
      - name: Εκκίνηση υπηρεσίας Citizens Registry
        run: |
          nohup mvn -B spring-boot:run -pl service \
            -Dspring-boot.run.arguments="--spring.profiles.active=test" \
            > service-startup.log 2>&1 &
          echo "SERVICE_PID=$!" >> $GITHUB_ENV

      # Αναμονή μέχρι η υπηρεσία να ανταποκριθεί (max 60 δευτερόλεπτα)
      - name: Αναμονή ετοιμότητας υπηρεσίας
        run: |
          echo "Αναμονή εκκίνησης υπηρεσίας..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/api/citizens/search > /dev/null 2>&1; then
              echo "✅ Η υπηρεσία είναι έτοιμη (δοκιμή $i)"
              exit 0
            fi
            echo "⏳ Δοκιμή $i/30 - αναμονή 2 δευτερολέπτων..."
            sleep 2
          done
          echo "❌ Η υπηρεσία δεν ξεκίνησε εγκαίρως"
          cat service-startup.log
          exit 1

      # Εκτέλεση δοκιμών ενοποίησης
      - name: Εκτέλεση δοκιμών ενοποίησης
        run: mvn -B failsafe:integration-test failsafe:verify -pl integration-tests

      # Μεταφόρτωση αρχείων αναφοράς Failsafe (integration tests)
      - name: Μεταφόρτωση αναφορών δοκιμών ενοποίησης
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-reports
          path: |
            integration-tests/target/failsafe-reports/
          retention-days: 30

      # Καταγραφή logs υπηρεσίας σε περίπτωση αποτυχίας
      - name: Εμφάνιση logs υπηρεσίας (σε περίπτωση αποτυχίας)
        if: failure()
        run: cat service-startup.log

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 3 (ΠΡΟΑΙΡΕΤΙΚΟ): Δημοσίευση εκτελέσιμου ως GitHub Release
  # ─────────────────────────────────────────────────────────────────────────
  release:
    name: Publish Pre-Release
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]   # Μόνο αν πέρασαν και οι δύο

    steps:
      - name: Checkout κώδικα
        uses: actions/checkout@v4

      - name: Εγκατάσταση JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build εκτελέσιμου JAR
        run: mvn -B package -DskipTests --file pom.xml

      # Δημιουργία tag με timestamp για μοναδική ταυτότητα
      - name: Δημιουργία release tag
        id: tag
        run: |
          TAG="pre-release-$(date +'%Y%m%d-%H%M%S')-${GITHUB_SHA::7}"
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Δημοσίευση ως GitHub Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Pre-Release ${{ steps.tag.outputs.tag }}"
          prerelease: true
          body: |
            Αυτόματη πρώιμη έκδοση από CI pipeline.
            - Branch: `develop`
            - Commit: `${{ github.sha }}`
            - Ημερομηνία: `${{ github.event.head_commit.timestamp }}`
          files: |
            service/target/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
